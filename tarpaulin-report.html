<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

log_file);\n        Self {\n            log_data,\n            work_dir: work_dir.to_path_buf(),\n        }\n    }\n\n    /// Load and parse JSONL log file\n    fn load_log_file(path: \u0026Path) -\u003e Vec\u003cValue\u003e {\n        if !path.exists() {\n            return Vec::new();\n        }\n\n        let file = match File::open(path) {\n            Ok(f) =\u003e f,\n            Err(_) =\u003e return Vec::new(),\n        };\n\n        let reader = BufReader::new(file);\n        let mut entries = Vec::new();\n\n        for line_text in reader.lines().map_while(Result::ok) {\n            if let Ok(value) = serde_json::from_str::\u003cValue\u003e(\u0026line_text) {\n                entries.push(value);\n            }\n        }\n\n        entries\n    }\n\n    /// Get the init message (first log entry)\n    pub fn init_message(\u0026self) -\u003e Option\u003c\u0026Value\u003e {\n        self.log_data.first()\n    }\n\n    /// Evaluate a check step\n    pub fn evaluate_check(\u0026self, check: \u0026CheckStep) -\u003e Result\u003c(), String\u003e {\n        let cmd = \u0026check.command.command;\n        let should_deny = check.deny || check.command.deny.unwrap_or(false);\n\n        let result = match cmd.as_str() {\n            \"workspace-file\" =\u003e {\n                let path = check.command.path.as_ref().ok_or(\"Missing path\")?;\n                file::check_workspace_file(\u0026self.work_dir, path)\n            }\n            \"workspace-dir\" =\u003e {\n                let path = check.command.path.as_ref().ok_or(\"Missing path\")?;\n                file::check_workspace_dir(\u0026self.work_dir, \u0026[path])\n            }\n            \"file-contains\" =\u003e {\n                let file = check.command.file.as_ref().ok_or(\"Missing file\")?;\n                let contains = check.command.contains.as_ref().ok_or(\"Missing contains\")?;\n                let deny = check.command.deny.unwrap_or(false);\n                let effective_deny = should_deny || deny;\n                file::check_file_content(\u0026self.work_dir, file, contains, !effective_deny)\n            }\n            \"log-contains\" =\u003e {\n                let pattern = check.command.pattern.as_ref().ok_or(\"Missing pattern\")?;\n                log::check_log_contains(\u0026self.log_data, pattern)\n            }\n            \"message-contains\" =\u003e {\n                let text = check.command.text.as_ref().ok_or(\"Missing text\")?;\n                log::check_output_contains(\u0026self.log_data, text)\n            }\n            \"skill-loaded\" =\u003e {\n                let skill = check.command.skill.as_ref().ok_or(\"Missing skill\")?;\n                skill::check_skill_loaded(self, skill)\n            }\n            \"skill-invoked\" =\u003e {\n                let skill = check.command.skill.as_ref().ok_or(\"Missing skill\")?;\n                let deny = check.command.deny.unwrap_or(false);\n                let effective_deny = should_deny || deny;\n                skill::check_skill_invoked(self, skill, effective_deny)\n            }\n            \"mcp-loaded\" =\u003e {\n                let server = check.command.server.as_ref().ok_or(\"Missing server\")?;\n                mcp::check_mcp_loaded(self, server)\n            }\n            \"mcp-tool-invoked\" =\u003e {\n                let tool = check.command.tool.as_ref().ok_or(\"Missing tool\")?;\n                mcp::check_mcp_tool_invoked(self, tool)\n            }\n            \"mcp-success\" =\u003e {\n                let tool = check.command.tool.as_ref().ok_or(\"Missing tool\")?;\n                mcp::check_mcp_success(self, tool, false)\n            }\n            \"tool-use\" =\u003e {\n                let tool = check.command.tool.as_ref().ok_or(\"Missing tool\")?;\n                tool::check_tool_use(self, tool, None, None)\n            }\n            \"tool-param\" =\u003e {\n                let tool = check.command.tool.as_ref().ok_or(\"Missing tool\")?;\n                let param = check.command.param.as_ref().ok_or(\"Missing param\")?;\n                tool::check_param(self, tool, param, check.command.value.as_deref())\n            }\n            \"db-query\" =\u003e {\n                let expected = check.command.expected.as_ref().ok_or(\"Missing expected\")?;\n                let query = check.command.query.as_ref().ok_or(\"Missing query\")?;\n                let db = check.command.db.as_deref().unwrap_or(\"\");\n                database::check_db_query(\u0026self.work_dir, db, expected, query)\n            }\n            _ =\u003e Err(format!(\"Unknown check command: {}\", cmd)),\n        };\n\n        if should_deny {\n            match result {\n                Ok(_) =\u003e Err(\"Check passed but was marked as deny\".to_string()),\n                Err(_) =\u003e Ok(()),\n            }\n        } else {\n            result\n        }\n    }\n}\n","traces":[{"line":30,"address":[],"length":0,"stats":{"Line":20}},{"line":31,"address":[],"length":0,"stats":{"Line":60}},{"line":34,"address":[],"length":0,"stats":{"Line":20}},{"line":39,"address":[],"length":0,"stats":{"Line":20}},{"line":40,"address":[],"length":0,"stats":{"Line":20}},{"line":41,"address":[],"length":0,"stats":{"Line":2}},{"line":44,"address":[],"length":0,"stats":{"Line":36}},{"line":45,"address":[],"length":0,"stats":{"Line":36}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":49,"address":[],"length":0,"stats":{"Line":54}},{"line":50,"address":[],"length":0,"stats":{"Line":36}},{"line":52,"address":[],"length":0,"stats":{"Line":6174}},{"line":53,"address":[],"length":0,"stats":{"Line":18336}},{"line":54,"address":[],"length":0,"stats":{"Line":12216}},{"line":58,"address":[],"length":0,"stats":{"Line":18}},{"line":62,"address":[],"length":0,"stats":{"Line":26}},{"line":63,"address":[],"length":0,"stats":{"Line":26}},{"line":67,"address":[],"length":0,"stats":{"Line":0}},{"line":68,"address":[],"length":0,"stats":{"Line":0}},{"line":69,"address":[ n init skills array\",\n            skill_name\n        ))\n    }\n}\n\n/// Check if skill was invoked\n/// inverted: true means check that skill was NOT invoked\npub fn check_skill_invoked(\n    checker: \u0026AssertionChecker,\n    skill_name: \u0026str,\n    inverted: bool,\n) -\u003e Result\u003c(), String\u003e {\n    // Search log for skill invocation\n    // Pattern: \"Skill\" tool_use with \"skill\":\"patent-kit:\u003cskill-name\u003e\"\n    let found = checker\n        .log_data\n        .iter()\n        .filter_map(|entry| entry.get(\"message\"))\n        .filter_map(|msg| msg.get(\"content\"))\n        .filter_map(|content| content.as_array())\n        .any(|items| {\n            items.iter().any(|item| {\n                item.get(\"type\")\n                    .and_then(|t| t.as_str())\n                    .map(|t| t == \"tool_use\")\n                    .unwrap_or(false)\n                    \u0026\u0026 item\n                        .get(\"name\")\n                        .and_then(|n| n.as_str())\n                        .map(|n| n == \"Skill\")\n                        .unwrap_or(false)\n                    \u0026\u0026 item\n                        .get(\"input\")\n                        .and_then(|i| i.get(\"skill\"))\n                        .and_then(|s| s.as_str())\n                        .map(|s| s.contains(skill_name))\n                        .unwrap_or(false)\n            })\n        });\n\n    match (found, inverted) {\n        (true, false) =\u003e Ok(()),\n        (false, true) =\u003e Ok(()),\n        (true, true) =\u003e Err(format!(\n            \"Skill '{}' was invoked but should not have been\",\n            skill_name\n        )),\n        (false, false) =\u003e Err(format!(\"Skill '{}' was not invoked\", skill_name)),\n    }\n}\n","traces":[{"line":7,"address":[],"length":0,"stats":{"Line":16}},{"line":8,"address":[],"length":0,"stats":{"Line":32}},{"line":10,"address":[],"length":0,"stats":{"Line":16}},{"line":12,"address":[],"l sult.is_ok(), \"google-patent-cli MCP should be loaded\");\n\n        // arxiv-cli MCP server should be loaded\n        let result = crate::assertions::mcp::check_mcp_loaded(\u0026checker, \"plugin:arxiv-cli:arxiv-cli\");\n        assert!(result.is_ok(), \"arxiv-cli MCP should be loaded\");\n\n        // Non-existent MCP should fail\n        let result = crate::assertions::mcp::check_mcp_loaded(\u0026checker, \"non-existent-mcp\");\n        assert!(result.is_err(), \"non-existent MCP should not be found\");\n    }\n\n    #[test]\n    fn test_log_contains_check() {\n        let checker = create_checker(\"tests/fixtures/logs/20260308_133201_functional-analyze-patent.log\");\n\n        // The log should contain system messages\n        let result = crate::assertions::log::check_log_contains(\u0026checker.log_data, \"system\");\n        assert!(result.is_ok(), \"log should contain 'system'\");\n\n        // The log should not contain a very unlikely string\n        let result = crate::assertions::log::check_log_contains(\u0026checker.log_data, \"xyz123abc456def789\");\n        assert!(result.is_err(), \"log should not contain random string\");\n    }\n\n    #[test]\n    fn test_output_contains_check() {\n        let checker = create_checker(\"tests/fixtures/logs/20260307_020146_uses-question-responder.log\");\n\n        // The log should contain assistant messages\n        let result = crate::assertions::log::check_output_contains(\u0026checker.log_data, \"user\");\n        assert!(result.is_ok(), \"log should contain 'user' in assistant messages\");\n    }\n\n    #[test]\n    fn test_file_content_check() {\n        let work_dir = tempfile::tempdir().unwrap();\n        let test_file = work_dir.path().join(\"test.txt\");\n        std::fs::write(\u0026test_file, \"Hello, World!\").unwrap();\n\n        // Check that file contains expected content\n        let result = crate::assertions::file::check_file_content(work_dir.path(), \"test.txt\", \"Hello\", true);\n        assert!(result.is_ok(), \"file should contain 'Hello'\");\n\n        // Check that file does not contain unexpected content\n        let result = crate::assertions::file::check_file_content(work_dir.path(), \"test.txt\", \"Goodbye\", false);\n        assert!(result.is_ok(), \"file should not contain 'Goodbye'\");\n    }\n\n    #[test]\n    fn test_file_content_not_found() {\n        let work_dir = tempfile::tempdir().unwrap();\n        let test_file = work_dir.path().join(\"test.txt\");\n        std::fs::write(\u0026test_file, \"Hello, World!\").unwrap();\n\n        // Check that file contains expected content (positive case)\n        let result = crate::assertions::file::check_file_content(work_dir.path(), \"test.txt\", \"Hello\", true);\n        assert!(result.is_ok(), \"file should contain 'Hello'\");\n\n        // Check that file contains unexpected content (should fail)\n        let result = crate::assertions::file::check_file_content(work_dir.path(), \"test.txt\", \"Hello\", false);\n        assert!(result.is_err(), \"file should not fail negative check for 'Hello'\");\n    }\n\n    #[test]\n    fn test_workspace_file_check() {\n        let work_dir = tempfile::tempdir().unwrap();\n        let test_file = work_dir.path().join(\"output.txt\");\n        std::fs::write(\u0026test_file, \"test content\").unwrap();\n\n        let result = crate::assertions::file::check_workspace_file(work_dir.path(), \"output.txt\");\n        assert!(result.is_ok(), \"workspace file should exist\");\n\n        let result = crate::assertions::file::check_workspace_file(work_dir.path(), \"nonexistent.txt\");\n        assert!(result.is_err(), \"nonexistent file should not exist\");\n    }\n\n    #[test]\n    fn test_workspace_dir_check() {\n        let work_dir = tempfile::tempdir().unwrap();\n        let test_dir = work_dir.path().join(\"subdir\");\n        std::fs::create_dir(\u0026test_dir).unwrap();\n\n        let result = crate::assertions::file::check_workspace_dir(work_dir.path(), \u0026[\"subdir\"]);\n        assert!(result.is_ok(), \"workspace directory should exist\");\n\n        let result = crate::assertions::file::check_workspace_dir(work_dir.path(), \u0026[\"nonexistent\"]);\n        assert!(result.is_err(), \"nonexistent directory should not exist\");\n    }\n\n    #[test]\n    fn test_workspace_dir_multiple() {\n        let work_dir = tempfile::tempdir().unwrap();\n        std::fs::create_dir(work_dir.path().join(\"dir1\")).unwrap();\n        std::fs::create_dir(work_dir.path().join(\"dir2\")).unwrap();\n\n        let result = crate::assertions::file::check_workspace_dir(work_dir.path(), \u0026[\"dir1\", \"dir2\"]);\n        assert!(result.is_ok(), \"all workspace directories should exist\");\n\n        let result = crate::assertions::file::check_workspace_dir(work_dir.path(), \u0026[\"dir1\", \"nonexistent\"]);\n        assert!(result.is_err(), \"should fail if any directory is missing\");\n    }\n\n    #[test]\n    fn test_init_message_extraction() {\n        let checker = create_checker(\"tests/fixtures/logs/20260308_133201_functional-analyze-patent.log\");\n\n        let init = checker.init_message();\n        assert!(init.is_some(), \"should have init message\");\n\n        let init = init.unwrap();\n        assert_eq!(init[\"type\"], \"system\");\n        assert_eq!(init[\"subtype\"], \"init\");\n    }\n\n    #[test]\n    fn test_init_message_missing_in_empty_log() {\n        let work_dir = tempfile::tempdir().unwrap();\n        let empty_log = work_dir.path().join(\"empty.log\");\n        std::fs::write(\u0026empty_log, \"\").unwrap();\n\n        let checker = AssertionChecker::new(\u0026empty_log, work_dir.path());\n        let init = checker.init_message();\n        assert!(init.is_none(), \"empty log should not have init message\");\n    }\n\n    #[test]\n    fn test_multiple_skills_loaded() {\n        let checker = create_checker(\"tests/fixtures/logs/20260308_133201_functional-analyze-patent.log\");\n\n        // Multiple \n/// Check if tool was called\npub fn check_tool_use(\n    checker: \u0026AssertionChecker,\n    tool_name: \u0026str,\n    param_name: Option\u003c\u0026str\u003e,\n    param_pattern: Option\u003c\u0026str\u003e,\n) -\u003e Result\u003c(), String\u003e {\n    // Find tool_use entries\n    let tool_uses: Vec\u003c_\u003e = checker\n        .log_data\n        .iter()\n        .filter_map(|entry| entry.get(\"message\"))\n        .filter_map(|msg| msg.get(\"content\"))\n        .filter_map(|content| content.as_array())\n        .flat_map(|items| items.iter())\n        .filter(|item| {\n            item.get(\"type\")\n                .and_then(|t| t.as_str())\n                .map(|t| t == \"tool_use\")\n                .unwrap_or(false)\n        })\n        .collect();\n\n    // First check if tool was called at all\n    let tool_found = tool_uses.iter().any(|tool| {\n        tool.get(\"name\")\n            .and_then(|n| n.as_str())\n            .map(|n| n == tool_name)\n            .unwrap_or(false)\n    });\n\n    if !tool_found {\n        return Err(format!(\"Tool '{}' was not called\", tool_name));\n    }\n\n    // Check for specific parameter if requested\n    if let Some(param) = param_name {\n        let param_found = tool_uses\n            .iter()\n            .filter(|tool| {\n                tool.get(\"name\")\n                    .and_then(|n| n.as_str())\n                    .map(|n| n == tool_name)\n                    .unwrap_or(false)\n            })\n            .any(|tool| {\n                tool.get(\"input\")\n                    .and_then(|input| input.get(param))\n                    .is_some()\n            });\n\n        if !param_found {\n            return Err(format!(\n                \"Parameter '{}' not found in tool '{}' call\",\n                param, tool_name\n            ));\n        }\n\n        // Check parameter value pattern if requested\n        if let Some(pattern) = param_pattern {\n            let regex =\n                Regex::new(pattern).map_err(|e| format!(\"Invalid regex '{}': {}\", pattern, e))?;\n\n            let pattern_matches = tool_uses\n                .iter()\n                .filter(|tool| {\n                    tool.get(\"name\")\n                        .and_then(|n| n.as_str())\n                        .map(|n| n == tool_name)\n                        .unwrap_or(false)\n                })\n                .any(|tool| {\n                    tool.get(\"input\")\n                        .and_then(|input| input.get(param))\n                        .and_then(|p| p.as_str())\n                        .map(|p| regex.is_match(p))\n                        .unwrap_or(false)\n                });\n\n            if !pattern_matches {\n                return Err(format!(\n                    \"Parameter '{}' in tool '{}' does not match pattern '{}'\",\n                    param, tool_name, pattern\n                ));\n            }\n        }\n    }\n\n    Ok(())\n}\n\n/// Check if parameter was used with specific value\npub fn check_param(\n    checker: \u0026AssertionChecker,\n    tool_name: \u0026str,\n    param_name: \u0026str,\n    expected: Option\u003c\u0026str\u003e,\n) -\u003e Result\u003c(), String\u003e {\n    // First verify tool was called with parameter\n    check_tool_use(checker, tool_name, Some(param_name), None)?;\n\n    // If expected value provided, check it\n    if let Some(expected_value) = expected {\n        let tool_uses: Vec\u003c_\u003e = checker\n            .log_data\n            .iter()\n            .filter_map(|entry| entry.get(\"message\"))\n            .filter_map(|msg| msg.get(\"content\"))\n            .filter_map(|content| content.as_array())\n            .flat_map(|items| items.iter())\n            .filter(|item| {\n                item.get(\"type\")\n                    .and_then(|t| t.as_str())\n                    .map(|t| t == \"tool_use\")\n                    .unwrap_or(false)\n            })\n            .filter(|tool| {\n                tool.get(\"name\")\n                    .and_then(|n| n.as_str())\n                    .map(|n| n == tool_name)\n                    .unwrap_or(false)\n            })\n            .collect();\n\n        let value_matches = tool_uses.iter().any(|tool| {\n            tool.get(\"input\")\n                .and_then(|input| input.get(param_name))\n                .map(|value| {\n                    // Handle both string and array values\n                    match value {\n                        Value::String(s) =\u003e s == expected_value,\n                        Value::Array(arr) =\u003e arr.iter().any(|item| {\n                            item.as_str().map(|s| s == expected_value).unwrap_or(false)\n                        }),\n                        _ =\u003e false,\n                    }\n                })\n                .unwrap_or(false)\n        });\n\n        if !value_matches {\n            return Err(format!(\n                \"Parameter '{}' in tool '{}' does not match expected value '{}'\",\n                param_name, tool_name, expected_value\n            ));\n        }\n    }\n\n    Ok(())\n}\n","traces":[{"line":9,"address":[],"length":0,"stats":{"Line":0}},{"line":16,"address":[],"length":0,"stats":{"Line":0}},{"line":17,"address":[],"length":0,"stats":{"Line":0}},{"line":19,"address":[],"length":0,"stats":{"Line":0}},{"line":20,"address":[],"length":0,"stats":{"Line":0}},{"line":21,"address":[],"length":0,"stats":{"Line":0}},{"line":22,"address":[],"length":0,"stats":{"Line":0}},{"line":23,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":35,"address":[],"length":0,"stats" ss":[],"length":0,"stats":{"Line":0}},{"line":10,"address":[],"length":0,"stats":{"Line":0}},{"line":11,"address":[],"length":0,"stats":{"Line":0}},{"line":12,"address":[],"length":0,"stats":{"Line":0}},{"line":15,"address":[],"length":0,"stats":{"Line":0}},{"line":16,"address":[],"length":0,"stats":{"Line":0}},{"line":19,"address":[],"length":0,"stats":{"Line":0}},{"line":20,"address":[],"length":0,"stats":{"Line":0}},{"line":21,"address":[],"length":0,"stats":{"Line":0}},{"line":22,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":29,"address":[],"length":0,"stats":{"Line":0}},{"line":30,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":13},{"path":["/","workspaces","skill-bench","src","runtime","executor.rs"],"content":"//! Test executor with parallel execution support\n\nuse crate::assertions::AssertionChecker;\nuse crate::models::{CheckResult, TestCase, TestDescriptor, TestResult};\nuse crate::runtime::embedded::extract_harness_plugin;\nuse crate::runtime::workspace::TestWorkspace;\nuse anyhow::Result;\nuse rayon::prelude::*;\nuse rayon::ThreadPoolBuilder;\nuse std::path::PathBuf;\nuse std::process::Command;\nuse std::sync::Arc;\nuse std::time::{Duration, Instant};\nuse tracing::{error, info, warn};\n\n/// Test executor with parallel execution support\npub struct TestExecutor {\n    threads: usize,\n    claude_path: PathBuf,\n    _plugin_temp_dir: tempfile::TempDir, // Kept alive for lifetime of TestExecutor\n    harness_plugin: Arc\u003cPathBuf\u003e,\n}\n\nimpl TestExecutor {\n    /// Create a new test executor\n    pub fn new(threads: usize) -\u003e Result\u003cSelf\u003e {\n        // Find claude binary\n        let claude_path = which::which(\"claude\").unwrap_or_else(|_| PathBuf::from(\"claude\"));\n\n        // Extract embedded harness plugin to temp directory\n        let (temp_dir, plugin_dir) = extract_harness_plugin()?;\n\n        Ok(Self {\n            threads,\n            claude_path,\n            _plugin_temp_dir: temp_dir,\n            harness_plugin: Arc::new(plugin_dir),\n        })\n    }\n\n    /// Execute tests in parallel\n    pub fn execute_tests(\u0026self, tests: Vec\u003cTestDescriptor\u003e) -\u003e Result\u003cVec\u003cTestResult\u003e\u003e {\n        info!(\n            \"Executing {} tests with {} threads\",\n            tests.len(),\n            self.threads\n        );\n\n        // Configure thread pool\n        ThreadPoolBuilder::new()\n            .num_threads(self.threads)\n            .build_global()\n            .map_err(|e| anyhow::anyhow!(\"Failed to build thread pool: {}\", e))?;\n\n        // Execute tests in parallel\n        let harness_plugin = Arc::clone(\u0026self.harness_plugin);\n        let results: Vec\u003cTestResult\u003e = tests\n            .into_par_iter()\n            .map(|test| self.execute_single_test(test, harness_plugin.clone()))\n            .collect();\n\n        Ok(results)\n    }\n\n    /// Execute a single test\n    fn execute_single_test(\n        \u0026self,\n        desc: TestDescriptor,\n        harness_plugin: Arc\u003cPathBuf\u003e,\n    ) -\u003e TestResult {\n        let start = Instant::now();\n\n        info!(\"Starting test: {}/{}\", desc.skill_name, desc.test_name);\n\n        // Create workspace\n        let workspace = match TestWorkspace::create(\u0026desc.skill_name, \u0026desc.test_name) {\n            Ok(w) =\u003e w,\n            Err(e) =\u003e {\n                error!(\"Failed to create workspace for {}: {}\", desc.test_id, e);\n                return TestResult {\n                    test_id: desc.test_id.clone(),\n                    test_name: desc.test_name,\n                    skill_name: desc.skill_name,\n                    passed: false,\n                    duration: start.elapsed(),\n                    check_results: vec![],\n                    execution_error: Some(format!(\"Workspace creation failed: {}\", e)),\n                };\n            }\n        };\n\n        // Copy harness plugin to workspace\n        let dest = workspace.path().join(\"claude-plugin\");\n        if let Err(e) = fs_extra::copy_items(\n            \u0026[harness_plugin.as_path()],\n            \u0026dest,\n            \u0026fs_extra::dir::CopyOptions::new(),\n        ) {\n            warn!(\"Failed to copy harness plugin for {}: {}\", desc.test_id, e);\n        }\n\n        // Run setup steps\n        if let Err(e) = workspace.run_setup(\u0026desc.test.setup) {\n            error!(\"Setup failed for {}: {}\", desc.test_id, e);\n            return TestResult {\n                test_id: desc.test_id.clone(),\n                test_name: desc.test_name,\n                skill_name: desc.skill_name,\n                passed: false,\n                duration: start.elapsed(),\n                check_results: vec![],\n                execution_error: Some(format!(\"Setup failed: {}\", e)),\n            };\n        }\n\n        // Execute Claude CLI\n        let log_path = workspace.log_path().to_path_buf();\n        match self.execute_claude(\u0026workspace, \u0026desc.test) {\n            Ok(_) =\u003e {\n                info!(\"Claude execution completed for {}\", desc.test_id);\n            }\n            Err(e) =\u003e {\n                warn!(\"Claude execution error for {}: {}\", desc.test_id, e);\n                return TestResult {\n                    test_id: desc.test_id.clone(),\n                    test_name: desc.test_name,\n                    skill_name: desc.skill_name,\n                    passed: false,\n                    duration: start.elapsed(),\n                    check_results: vec![],\n                    execution_error: Some(format!(\"Claude execution failed: {}\", e)),\n                };\n            }\n        }\n\n        // Run assertions\n        let checker = AssertionChecker::new(\u0026log_path, workspace.path());\n        let check_results: Vec\u003cCheckResult\u003e = desc\n            .test\n            .checks\n            .iter()\n            .map(|check| match checker.evaluate_check(check) {\n                Ok(()) =\u003e CheckResult {\n                    name: check.name.clone(),\n                    passed: true,\n                    error: None,\n                },\n                Err(e) =\u003e {\n                    warn!(\"Check '{}' failed for {}: {}\", check.name, desc.test_id, e);\n                    CheckResult {\n                        name: check.name.clone(),\n                        passed: false,\n                        error: Some(e),\n                    }\n                }\n            })\n            .collect();\n\n        let passed = check_results.iter().all(|r| r.passed);\n        let duration = start.elapsed();\n\n        info!(\n            \"Test {} completed: {} ({:.2}s)\",\n            desc.test_id,\n            if passed { \"PASS\" } else { \"FAIL\" },\n            duration.as_secs_f64()\n        );\n\n        TestResult {\n            test_id: desc.test_id,\n            test_name: desc.test_name,\n            skill_name: desc.skill_name,\n            passed,\n            duration,\n            check_results,\n            execution_error: None,\n        }\n    }\n\n    /// Execute Claude CLI\n    fn execute_claude(\u0026self, workspace: \u0026TestWorkspace, test: \u0026TestCase) -\u003e Result\u003c()\u003e {\n        let timeout = Duration::from_secs(test.timeout);\n\n        let mut child = Command::new(\u0026self.claude_path)\n            .args([\n                \"-p\",\n                \"--dangerously-skip-permissions\",\n                \"--verbose\",\n                \"--output-format\",\n                \"stream-json\",\n                \"--plugin-dir\",\n                \"./claude-plugin\",\n                \"--\",\n                test.test_prompt.trim(),\n            ])\n            .current_dir(workspace.path())\n            .env(\"CLAUDECODE\", \"\") // Unset to avoid nested session\n            .env(\"SKILL_BENCH_TEST\", \"1\")\n            .stdout(std::fs::File::create(workspace.log_path())?)\n            .stderr(std::process::Stdio::piped())\n            .spawn()\n            .map_err(|e| anyhow::anyhow!(\"Failed to spawn claude: {}\", e))?;\n\n        // Wait with timeout\n        let start = Instant::now();\n        loop {\n            match child.try_wait() {\n                Ok(Some(status)) =\u003e {\n                    if status.success() {\n                        return Ok(());\n                    } else {\n                        return Err(anyhow::anyhow!(\"Claude exited with status: {}\", status));\n                    }\n                }\n                Ok(None) =\u003e {\n                    if start.elapsed() \u003e timeout {\n                        child\n                            .kill()\n                            .map_err(|e| anyhow::anyhow!(\"Failed to kill claude: {}\", e))?;\n                        return Err(anyhow::anyhow!(\n                            \"Test timed out after {}s\",\n                            timeout.as_secs()\n                        ));\n                    }\n                    std::thread::sleep(Duration::from_millis(100));\n                }\n                Err(e) =\u003e {\n                    return Err(anyhow::anyhow!(\"Failed to wait for claude: {}\", e));\n                }\n            }\n        }\n    }\n}\n","traces":[{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":35,"address":[],"length":0,"stats":{"Line":0}},{"line":36,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[],"length":0,"stats":{"Line":0}},{"line":43,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"L     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
</script>
